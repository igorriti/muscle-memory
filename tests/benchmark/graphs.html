<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Muscle Memory Benchmark</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #fff; color: #09090b; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif; padding: 40px; display: flex; flex-direction: column; gap: 48px; align-items: center; }
  .card { width: 720px; border: 1px solid #e4e4e7; border-radius: 12px; padding: 24px 28px 20px; background: #fff; }
  .card h3 { font-size: 16px; font-weight: 600; color: #09090b; margin-bottom: 2px; }
  .card p { font-size: 13px; color: #71717a; margin-bottom: 16px; }
  canvas { width: 100% !important; height: 320px !important; }
</style>
</head>
<body>

<div class="card" id="c1">
  <h3>Cost over queries</h3>
  <p>Cumulative API cost (USD) &mdash; gpt-5.4, 128 tools, 20 e-commerce patterns</p>
  <canvas id="g1"></canvas>
</div>

<div class="card" id="c2">
  <h3>Tokens over queries</h3>
  <p>Cumulative LLM tokens used &mdash; memory-served queries use zero tokens</p>
  <canvas id="g2"></canvas>
</div>

<div class="card" id="c3">
  <h3>Speedup over queries</h3>
  <p>Average latency per query (ms) &mdash; lower is better</p>
  <canvas id="g3"></canvas>
</div>

<script>
const Q = [10, 50, 100, 250, 500, 1000];

const woCost = [0.04, 0.21, 0.41, 1.03, 2.07, 4.15];
const wCost  = [0.04, 0.21, 0.41, 0.64, 0.94, 1.56];

const woTok = [40028, 200653, 401200, 1004023, 2008645, 4017966];
const wTok  = [40028, 200653, 401200, 252000, 360000, 714768];

const woLat = [1822, 2003, 1914, 1983, 1961, 1983];
const wLat  = [1619, 1921, 1918, 1271, 991, 871];

const shared = {
  borderWidth: 2,
  pointRadius: 4,
  pointHoverRadius: 6,
  tension: 0.3,
  fill: false,
};

const wo = { ...shared, label: 'Without Muscle Memory', borderColor: '#ef4444', backgroundColor: '#ef4444', pointBackgroundColor: '#ef4444' };
const w  = { ...shared, label: 'With Muscle Memory',    borderColor: '#22c55e', backgroundColor: '#22c55e', pointBackgroundColor: '#22c55e' };

const scaleX = {
  grid: { color: '#f4f4f5' },
  ticks: { color: '#71717a', font: { size: 11 } },
  title: { display: true, text: 'Queries', color: '#a1a1aa', font: { size: 11 } },
};
const baseOpts = {
  responsive: true,
  maintainAspectRatio: false,
  interaction: { mode: 'index', intersect: false },
  plugins: {
    legend: { position: 'bottom', labels: { color: '#71717a', padding: 16, usePointStyle: true, pointStyleWidth: 10, font: { size: 11 } } },
  },
};

// ── Graph 1: Cost ──
new Chart(document.getElementById('g1'), {
  type: 'line',
  data: { labels: Q.map(String), datasets: [
    { ...wo, data: woCost },
    { ...w,  data: wCost },
  ]},
  options: { ...baseOpts, scales: {
    x: scaleX,
    y: { grid: { color: '#f4f4f5' }, ticks: { color: '#71717a', callback: v => '$' + v.toFixed(1), font: { size: 11 } }, title: { display: true, text: 'Cumulative Cost (USD)', color: '#a1a1aa', font: { size: 11 } } },
  }},
});

// ── Graph 2: Tokens ──
new Chart(document.getElementById('g2'), {
  type: 'line',
  data: { labels: Q.map(String), datasets: [
    { ...wo, data: woTok },
    { ...w,  data: wTok },
  ]},
  options: { ...baseOpts, scales: {
    x: scaleX,
    y: { grid: { color: '#f4f4f5' }, ticks: { color: '#71717a', callback: v => (v/1000).toFixed(0) + 'K', font: { size: 11 } }, title: { display: true, text: 'Cumulative Tokens', color: '#a1a1aa', font: { size: 11 } } },
  }},
});

// ── Graph 3: Speedup (avg latency) ──
new Chart(document.getElementById('g3'), {
  type: 'line',
  data: { labels: Q.map(String), datasets: [
    { ...wo, data: woLat },
    { ...w,  data: wLat },
  ]},
  options: { ...baseOpts, scales: {
    x: scaleX,
    y: { grid: { color: '#f4f4f5' }, ticks: { color: '#71717a', callback: v => v + 'ms', font: { size: 11 } }, title: { display: true, text: 'Avg Latency per Query (ms)', color: '#a1a1aa', font: { size: 11 } }, min: 0 },
  }},
});
</script>
</body>
</html>
